name: self-test

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  smoke:
    name: Smoke test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout action
        uses: actions/checkout@v4

      - name: Create a tiny Laravel-shaped fixture with planted findings
        shell: bash
        run: |
          mkdir -p fixture/{app,config,routes,public,bootstrap,database/migrations,resources/views}
          # Marker files that satisfy lsec's Laravel-root validation
          # (artisan + bootstrap/app.php OR config/app.php).
          echo '{"name":"fixture/app","require":{"laravel/framework":"^11.0"}}' > fixture/composer.json
          touch fixture/artisan
          echo '<?php return [];' > fixture/bootstrap/app.php
          echo '<?php return [];' > fixture/config/app.php
          # Planted findings.
          cat > fixture/.env <<'EOF'
          APP_ENV=production
          APP_DEBUG=true
          APP_KEY=base64:AAAA
          DB_PASSWORD=hunter2
          EOF
          cat > fixture/app/Insecure.php <<'EOF'
          <?php
          $cmd = $_GET['cmd'];
          eval($cmd);
          shell_exec($cmd);
          $token = "ghp_AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA";
          EOF

      - name: Run lsec action against fixture (advisory)
        id: lsec
        uses: ./
        continue-on-error: true
        with:
          path: fixture
          fail-on: critical
          upload-sarif: false
          post-comment: false

      - name: Assert outputs are populated
        shell: bash
        env:
          TOTAL: ${{ steps.lsec.outputs.findings-count }}
          RESULT: ${{ steps.lsec.outputs.result }}
          EXIT: ${{ steps.lsec.outputs.exit-code }}
        run: |
          echo "result=$RESULT total=$TOTAL exit-code=$EXIT"
          if [ -z "$TOTAL" ] || [ -z "$RESULT" ] || [ -z "$EXIT" ]; then
            echo "::error::expected outputs missing"
            exit 1
          fi
          if [ "$TOTAL" -lt 1 ]; then
            echo "::error::expected at least one finding from planted fixture"
            exit 1
          fi
          case "$RESULT" in
            pass|fail) ;;
            *) echo "::error::unexpected result value: $RESULT"; exit 1 ;;
          esac

      - name: Verify JSON report shape
        shell: bash
        run: |
          test -f lsec-report.json
          jq -e '.counts.total >= 1 and (.findings | length) >= 1' lsec-report.json
