name: lsec — Laravel Security Audit
description: Scan a Laravel project for security issues, upload SARIF to Code Scanning, and annotate PRs with findings.
author: Afaan Bilal

branding:
  icon: shield
  color: green

inputs:
  path:
    description: Path to the Laravel project root.
    required: false
    default: .

  version:
    description: lsec release version to install (e.g. 0.1.4) or "latest".
    required: false
    default: latest

  fail-on:
    description: Minimum severity that fails the job (critical | high | medium | low | info).
    required: false
    default: high

  min-confidence:
    description: Minimum confidence score for reported findings (0.0 – 1.0).
    required: false
    default: "0.7"

  baseline:
    description: Path to a baseline file used to suppress known findings.
    required: false
    default: ""

  only:
    description: Comma-separated rule categories to include (env,auth,injection,http,storage,deps,secrets,logging).
    required: false
    default: ""

  skip:
    description: Comma-separated rule categories to skip.
    required: false
    default: ""

  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning. Requires `security-events: write`."
    required: false
    default: "true"

  post-comment:
    description: "Post (or update) a summary comment on the pull request. Requires `pull-requests: write`."
    required: false
    default: "true"

  sarif-output:
    description: Path to write the SARIF report.
    required: false
    default: lsec.sarif

  json-output:
    description: Path to write the JSON report.
    required: false
    default: lsec-report.json

outputs:
  findings-count:
    description: Total number of findings reported.
    value: ${{ steps.scan.outputs.findings-count }}
  critical-count:
    description: Number of CRITICAL findings.
    value: ${{ steps.scan.outputs.critical-count }}
  high-count:
    description: Number of HIGH findings.
    value: ${{ steps.scan.outputs.high-count }}
  medium-count:
    description: Number of MEDIUM findings.
    value: ${{ steps.scan.outputs.medium-count }}
  low-count:
    description: Number of LOW findings.
    value: ${{ steps.scan.outputs.low-count }}
  info-count:
    description: Number of INFO findings.
    value: ${{ steps.scan.outputs.info-count }}
  result:
    description: Overall scan result — `pass` or `fail`.
    value: ${{ steps.scan.outputs.result }}
  exit-code:
    description: Raw lsec exit code (0 = clean, 1 = threshold breached, 2 = runtime error).
    value: ${{ steps.scan.outputs.exit-code }}
  sarif-path:
    description: "Path to the generated SARIF file (empty when `upload-sarif: false`)."
    value: ${{ inputs.upload-sarif == 'true' && inputs.sarif-output || '' }}
  json-path:
    description: Path to the generated JSON report.
    value: ${{ inputs.json-output }}

runs:
  using: composite
  steps:
    - name: Install lsec
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        INSTALL_DIR: ${{ runner.temp }}/lsec-bin
      run: bash "$GITHUB_ACTION_PATH/scripts/install.sh"

    - name: Run lsec (JSON)
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_FAIL_ON: ${{ inputs.fail-on }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_ONLY: ${{ inputs.only }}
        INPUT_SKIP: ${{ inputs.skip }}
        JSON_OUTPUT: ${{ inputs.json-output }}
      run: bash "$GITHUB_ACTION_PATH/scripts/scan.sh"

    - name: Run lsec (SARIF)
      if: inputs.upload-sarif == 'true'
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_ONLY: ${{ inputs.only }}
        INPUT_SKIP: ${{ inputs.skip }}
        SARIF_OUTPUT: ${{ inputs.sarif-output }}
      run: bash "$GITHUB_ACTION_PATH/scripts/sarif.sh"

    - name: Upload SARIF to Code Scanning
      if: inputs.upload-sarif == 'true'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.sarif-output }}

    - name: Post PR comment
      if: always() && inputs.post-comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        RESULT: ${{ steps.scan.outputs.result }}
        FAIL_ON: ${{ inputs.fail-on }}
        JSON_REPORT: ${{ inputs.json-output }}
      run: bash "$GITHUB_ACTION_PATH/scripts/comment.sh"

    - name: Enforce scan result
      shell: bash
      env:
        RESULT: ${{ steps.scan.outputs.result }}
      run: |
        if [ "$RESULT" = "fail" ]; then
          echo "::error::lsec scan failed with findings at or above the configured threshold"
          exit 1
        fi
        exit 0
